# Copy to repository-root config.yaml before running:
# cp config.regression.example.yaml config.yaml
competition:
  slug: playground-series-s5e10
  task_type: regression
  primary_metric: mse

  # Optional schema overrides when inference is ambiguous or the competition is not Playground-shaped.
  # id_column: id
  # label_column: target

  cv:
    n_splits: 7
    shuffle: true
    random_state: 42

  # Optional feature-typing overrides:
  # features:
  #   force_categorical:
  #     - some_integer_flag
  #   force_numeric:
  #     - some_count_feature
  #   drop_columns:
  #     - some_leaky_column
  #   low_cardinality_int_threshold: 20

experiment:
  tracking:
    tracking_uri: http://localhost:5000

  runtime:
    compute_target: auto
    # Advanced/transitional override. Leave on auto for normal use.
    # gpu_backend: auto

  candidates:
    # Remove entries you do not want to include in the current train batch.
    - candidate_type: model
      model_family: elasticnet
      representation:
        operators:
          - id: standardize_numeric
          - id: onehot_encode_low_cardinality_categoricals
            max_cardinality: 20
        pruners: []
      model_params: {}
      # To enable optimization, replace model_params with an optimization block:
      # optimization:
      #   method: optuna
      #   n_trials: 25
      #   timeout_seconds: 3600
      #   random_state: 42

    - candidate_type: model
      model_family: lightgbm
      representation:
        operators:
          - id: native_numeric
          - id: ordinal_encode_categoricals
        pruners: []
      model_params: {}

    # Optional blend candidate shape:
    # - candidate_type: blend
    #   base_candidate_ids:
    #     - existing_candidate_a
    #     - existing_candidate_b
    #   weights:
    #     - 0.5
    #     - 0.5

# Optional screening overrides — `train --screening` runs experiment.candidates
# with cheaper CV and an optional tuning budget override.
# Candidates live in experiment.candidates above; screening only provides mode overrides.
# screening:
#   cv:
#     n_splits: 2
#     shuffle: true
#     random_state: 42
#   # Optional optimization override applied to candidates without their own optimization:
#   # optimization:
#   #   method: optuna
#   #   n_trials: 10
#   #   timeout_seconds: 300
