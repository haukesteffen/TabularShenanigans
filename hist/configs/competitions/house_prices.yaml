competition:
  name: house_prices
  kaggle_slug: house-prices-advanced-regression-techniques

schema:
  target: SalePrice
  id_column: Id
  task_type: regression

evaluation:
  metric: rmse
  direction: minimize

submission:
  id_column: Id
  target_column: SalePrice
  prediction_type: raw

training:
  ensemble:
    learners:
      - name: xgb
        model_family: xgboost
        model_params:
          n_estimators: 500
          max_depth: 6
          learning_rate: 0.05
        tune:
          n_trials: 8
          search_space:
            n_estimators:
              type: int
              low: 300
              high: 1000
              step: 100
            max_depth:
              type: int
              low: 3
              high: 10
            learning_rate:
              type: float
              low: 0.01
              high: 0.2
              log: true
            subsample:
              type: float
              low: 0.6
              high: 1.0
            colsample_bytree:
              type: float
              low: 0.6
              high: 1.0
      - name: lgbm
        model_family: lightgbm
        model_params:
          n_estimators: 600
          num_leaves: 63
          learning_rate: 0.03
        tune:
          n_trials: 8
          search_space:
            n_estimators:
              type: int
              low: 300
              high: 1200
              step: 100
            num_leaves:
              type: int
              low: 31
              high: 255
            learning_rate:
              type: float
              low: 0.01
              high: 0.2
              log: true
            feature_fraction:
              type: float
              low: 0.6
              high: 1.0
            bagging_fraction:
              type: float
              low: 0.6
              high: 1.0
    stack:
      enabled: true
      method: linear
      promote: true
