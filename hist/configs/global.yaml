seed: 42
paths:
  data_dir: data
  artifacts_dir: artifacts
  reports_dir: reports

runtime:
  device: auto
  num_workers: 4

schema:
  train_file: train.csv
  test_file: test.csv
  task_type: auto

cv:
  split_version: v1
  rebuild_splits: false

training:
  model_family: xgboost
  cv_folds: 5
  model_params:
    n_estimators: 500
    max_depth: 6
    learning_rate: 0.05
  tune:
    n_trials: 10
    search_space:
      n_estimators:
        type: int
        low: 200
        high: 1000
        step: 100
      max_depth:
        type: int
        low: 3
        high: 10
      learning_rate:
        type: float
        low: 0.01
        high: 0.2
        log: true
      subsample:
        type: float
        low: 0.6
        high: 1.0
      colsample_bytree:
        type: float
        low: 0.6
        high: 1.0

evaluation:
  metric: accuracy
  direction: maximize

submission:
  id_column: id
  target_column: target
  prediction_type: raw
  classification_threshold: 0.5
  positive_label: 1
  negative_label: 0
