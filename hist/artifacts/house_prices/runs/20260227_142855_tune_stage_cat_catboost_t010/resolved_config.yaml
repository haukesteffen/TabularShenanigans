seed: 42
paths:
  data_dir: data
  artifacts_dir: artifacts
  reports_dir: reports
runtime:
  device: auto
  num_workers: 4
  name: local_arm64
  accelerator: mps_or_cpu
  mixed_precision: false
schema:
  train_file: train.csv
  test_file: test.csv
  task_type: regression
  target: SalePrice
  id_column: Id
cv:
  split_version: v1
  rebuild_splits: false
training:
  model_family: catboost
  cv_folds: 5
  model_params:
    iterations: 700
    depth: 10
    learning_rate: 0.07457164660631792
    l2_leaf_reg: 4.402919233362932
  tune:
    n_trials: 10
    search_space:
      n_estimators:
        type: int
        low: 200
        high: 1000
        step: 100
      max_depth:
        type: int
        low: 3
        high: 10
      learning_rate:
        type: float
        low: 0.01
        high: 0.2
        log: true
      subsample:
        type: float
        low: 0.6
        high: 1.0
      colsample_bytree:
        type: float
        low: 0.6
        high: 1.0
  ensemble:
    learners:
    - name: xgb
      model_family: xgboost
      model_params:
        n_estimators: 500
        max_depth: 6
        learning_rate: 0.05
      tune:
        n_trials: 8
        search_space:
          n_estimators:
            type: int
            low: 300
            high: 1000
            step: 100
          max_depth:
            type: int
            low: 3
            high: 10
          learning_rate:
            type: float
            low: 0.01
            high: 0.2
            log: true
          subsample:
            type: float
            low: 0.6
            high: 1.0
          colsample_bytree:
            type: float
            low: 0.6
            high: 1.0
    - name: lgbm
      model_family: lightgbm
      model_params:
        n_estimators: 600
        num_leaves: 63
        learning_rate: 0.03
      tune:
        n_trials: 8
        search_space:
          n_estimators:
            type: int
            low: 300
            high: 1200
            step: 100
          num_leaves:
            type: int
            low: 31
            high: 255
          learning_rate:
            type: float
            low: 0.01
            high: 0.2
            log: true
          feature_fraction:
            type: float
            low: 0.6
            high: 1.0
          bagging_fraction:
            type: float
            low: 0.6
            high: 1.0
    stack:
      enabled: true
      method: linear
      promote: true
  batch_size: 1024
  n_estimators: 500
  early_stopping_rounds: 50
evaluation:
  metric: rmse
  direction: minimize
submission:
  id_column: Id
  target_column: SalePrice
  prediction_type: raw
  classification_threshold: 0.5
  positive_label: 1
  negative_label: 0
competition:
  name: house_prices
  kaggle_slug: house-prices-advanced-regression-techniques
