seed: 42
paths:
  data_dir: data
  artifacts_dir: artifacts
  reports_dir: reports
runtime:
  device: auto
  num_workers: 4
  name: local_arm64
  accelerator: mps_or_cpu
  mixed_precision: false
schema:
  train_file: train.csv
  test_file: test.csv
  task_type: auto
  target: Survived
  id_column: PassengerId
cv:
  split_version: v1
  rebuild_splits: false
training:
  model_family: catboost
  cv_folds: 5
  model_params:
    iterations: 700
    depth: 6
    learning_rate: 0.04
  tune:
    n_trials: 10
    search_space:
      n_estimators:
        type: int
        low: 200
        high: 1000
        step: 100
      max_depth:
        type: int
        low: 3
        high: 10
      learning_rate:
        type: float
        low: 0.01
        high: 0.2
        log: true
      subsample:
        type: float
        low: 0.6
        high: 1.0
      colsample_bytree:
        type: float
        low: 0.6
        high: 1.0
  batch_size: 1024
  n_estimators: 500
  early_stopping_rounds: 50
evaluation:
  metric: accuracy
  direction: maximize
submission:
  id_column: PassengerId
  target_column: Survived
  prediction_type: label
  classification_threshold: 0.5
  positive_label: 1
  negative_label: 0
competition:
  name: titanic
  kaggle_slug: titanic
