# Copy to repository-root config.yaml before running:
# cp config.binary.example.yaml config.yaml
competition:
  slug: playground-series-s5e12
  task_type: binary
  primary_metric: roc_auc

  # Set this when labels are not one of the auto-resolved safe pairs:
  # [0, 1], [False, True], or ["No", "Yes"].
  #
  # `playground-series-s5e12` stores the target as 0.0 / 1.0, so keep this explicit.
  positive_label: 1

  # Optional schema overrides when inference is ambiguous or the competition is not Playground-shaped.
  # id_column: id
  # label_column: target

  cv:
    n_splits: 7
    shuffle: true
    random_state: 42

  # Optional feature-typing overrides:
  # features:
  #   force_categorical:
  #     - some_integer_flag
  #   force_numeric:
  #     - some_count_feature
  #   drop_columns:
  #     - some_leaky_column
  #   low_cardinality_int_threshold: 20

experiment:
  tracking:
    tracking_uri: http://localhost:5000

  runtime:
    compute_target: auto
    # Advanced/transitional override. Leave on auto for normal use.
    # gpu_backend: auto

  candidates:
    # Remove entries you do not want to include in the current train batch.
    - candidate_type: model
      feature_recipe_id: fr0
      model_family: logistic_regression
      numeric_preprocessor: standardize
      categorical_preprocessor: onehot
      model_params: {}
      # For logistic_regression, use l1_ratio only:
      # model_params:
      #   C: 1.0
      #   tol: 0.001
      #   l1_ratio: 0.0
      #   class_weight: balanced
      # To enable optimization, replace model_params with an optimization block:
      # optimization:
      #   method: optuna
      #   n_trials: 25
      #   timeout_seconds: 3600
      #   random_state: 42

    - candidate_type: model
      feature_recipe_id: fr0
      model_family: lightgbm
      numeric_preprocessor: median
      categorical_preprocessor: ordinal
      model_params: {}

    # Optional blend candidate shape:
    # - candidate_type: blend
    #   base_candidate_ids:
    #     - existing_candidate_a
    #     - existing_candidate_b
    #   weights:
    #     - 0.5
    #     - 0.5

  submit:
    enabled: false
    # message_prefix: s5e12-baseline
