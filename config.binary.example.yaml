# Copy to repository-root config.yaml before running:
# cp config.binary.example.yaml config.yaml
competition:
  slug: playground-series-s5e12
  task_type: binary
  primary_metric: roc_auc

  # Set this when labels are not one of the auto-resolved safe pairs:
  # [0, 1], [False, True], or ["No", "Yes"].
  # positive_label: "Yes"

  # Optional schema overrides when inference is ambiguous or the competition is not Playground-shaped.
  # id_column: id
  # label_column: target

  cv:
    n_splits: 7
    shuffle: true
    random_state: 42

  # Optional feature-typing overrides:
  # features:
  #   force_categorical:
  #     - some_integer_flag
  #   force_numeric:
  #     - some_count_feature
  #   drop_columns:
  #     - some_leaky_column
  #   low_cardinality_int_threshold: 20

experiment:
  name: baseline-logreg
  notes: onehot logistic-regression baseline for the default binary smoke test

  # Optional remote MLflow tracking for prepare/train/submit runs.
  # tracking:
  #   enabled: true
  #   tracking_uri: https://mlflow.example.com
  #   experiment_name: tabular-shenanigans/playground-series-s5e12

  candidate:
    candidate_type: model
    candidate_id: fr0--num_standardize__cat_onehot--logreg--v1
    feature_recipe_id: fr0
    model_family: logistic_regression
    numeric_preprocessor: standardize
    categorical_preprocessor: onehot
    model_params: {}

    # Candidate ids follow:
    # <feature_recipe_id>--<preprocessing_scheme_id>--<variant_token>--vN
    # Example competition-specific recipe token: fr1

    # Alternative binary model candidates:
    # numeric_preprocessor: kbins
    # categorical_preprocessor: onehot
    # model_family: logistic_regression
    # numeric_preprocessor: median
    # categorical_preprocessor: ordinal
    # model_family: lightgbm
    # numeric_preprocessor: median
    # categorical_preprocessor: native
    # model_family: catboost

    # Alternative blend candidate shape:
    # candidate_type: blend
    # candidate_id: blend__v1
    # base_candidate_ids:
    #   - existing_candidate_a
    #   - existing_candidate_b
    # weights:
    #   - 0.5
    #   - 0.5

    # Optional tuning settings for `uv run python main.py train`.
    optimization:
      enabled: false
      # method: optuna
      # n_trials: 25
      # timeout_seconds: 3600
      # random_state: 42

  submit:
    enabled: false
    # message_prefix: s5e12-baseline
